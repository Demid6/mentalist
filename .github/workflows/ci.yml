name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Debug - list all files
      run: |
        pwd
        ls -la
        ls -la web_service/
        cat web_service/requirements.txt
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: pip install -r web_service/requirements.txt
    
    - name: Run Django checks
      run: python web_service/mentalist_files/manage.py check
    
    - name: Check Dockerfiles exist
      run: |
        test -f web_service/Dockerfile && echo "✓ web_service/Dockerfile"
        test -f comments_service/Dockerfile && echo "✓ comments_service/Dockerfile"
        test -f notification_service/Dockerfile && echo "✓ notification_service/Dockerfile"
        test -f docker-compose.yml && echo "✓ docker-compose.yml"
    
    - name: Validate docker-compose
      run: docker-compose config -q && echo "✓ docker-compose valid"

  build:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Build Docker images
      run: |
        docker build -t web_service:latest ./web_service
        docker build -t comments_service:latest ./comments_service
        docker build -t notification_service:latest ./notification_service
        echo "✓ All images built successfully"
