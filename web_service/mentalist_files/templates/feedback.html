{% extends 'base.html' %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/feedback.css' %}">
{% endblock %}

{% block content %}
<div class="section">

    <div class="page-heading">
        <h1>Связь с CBI</h1>
        <p class="feedback-desc">Передайте анонимную наводку или важную информацию по делу</p>
    </div>

    <div class="feedback-container">
        <form id="feedbackForm" class="feedback-form">
            <div class="form-group">
                <label for="name">Ваше имя *</label>
                <input type="text" id="name" name="name" required placeholder="Иван Петров">
                <span class="error-message" id="name-error"></span>
            </div>

            <div class="form-group">
                <label for="email">Email *</label>
                <input type="email" id="email" name="email" required placeholder="ivan@example.com">
                <span class="error-message" id="email-error"></span>
            </div>

            <div class="form-group">
                <label for="message">Наводка *</label>
                <textarea id="message" name="message" required rows="5" placeholder="Опишите, что вы заметили..."></textarea>
                <span class="error-message" id="message-error"></span>
            </div>

            <button type="submit" id="submit-btn">Передать в CBI</button>
        </form>
    </div>

</div>

<script src="{% static 'js/feedback.js' %}"></script>
{% endblock %}
